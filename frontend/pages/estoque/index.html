<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estoque</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="min-h-screen bg-slate-100 p-4">
  <div class="mx-auto w-full max-w-5xl">
    <header class="flex items-center justify-between gap-4 mb-6">
      <div>
        <h1 class="text-2xl font-bold text-slate-800">Estoque</h1>
        <p class="text-slate-600 text-sm">Adicione produtos e visualize a lista em tempo real</p>
      </div>
      <div class="flex items-center flex-wrap gap-2">
        <a
          href="../dashboard/index.html"
          class="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 transition"
        >
          Dashboard
        </a>
        <a
          href="../caixa/index.html"
          class="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 transition"
        >
          Ir para caixa
        </a>
        <a
          href="../usuarios/index.html"
          class="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 transition"
        >
          Ir para usuários
        </a>
        <a
          href="../login/index.html"
          class="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 transition"
        >
          Voltar ao login
        </a>
      </div>
    </header>

    <main class="grid grid-cols-1 md:grid-cols-5 gap-6">
      <section class="md:col-span-2 bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
        <h2 id="productFormTitle" class="text-lg font-semibold text-slate-800">Adicionar produto</h2>
        <form id="productForm" class="mt-5 space-y-4">
          <div>
            <label for="nome" class="block text-sm font-medium text-slate-700 mb-1">Nome</label>
            <input
              id="nome"
              name="nome"
              type="text"
              placeholder="Ex: Parafuso 8mm"
              class="w-full rounded-xl border border-slate-300 px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
              required
              maxlength="120"
            />
          </div>

          <div>
            <label for="preco" class="block text-sm font-medium text-slate-700 mb-1">Preço (R$)</label>
            <input
              id="preco"
              name="preco"
              type="number"
              placeholder="0,00"
              class="w-full rounded-xl border border-slate-300 px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
              required
              min="0"
              step="0.01"
            />
          </div>

          <div>
            <label for="quantidade" class="block text-sm font-medium text-slate-700 mb-1">Quantidade</label>
            <input
              id="quantidade"
              name="quantidade"
              type="number"
              placeholder="0"
              class="w-full rounded-xl border border-slate-300 px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
              required
              min="0"
              step="1"
            />
          </div>

          <div>
            <label for="foto" class="block text-sm font-medium text-slate-700 mb-1">Foto do produto (opcional)</label>
            <input
              id="foto"
              name="foto"
              type="file"
              accept="image/*"
              class="w-full rounded-xl border border-slate-300 px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
            />
            <p id="fotoHelp" class="text-xs text-slate-500 mt-1">Opcional.</p>
            <div id="fotoPreviewBox" class="mt-3 rounded-xl border border-slate-200 bg-slate-50 p-3">
              <p class="text-xs font-medium text-slate-600 mb-2">Prévia da foto</p>
              <div
                class="flex min-h-40 max-w-xs items-center justify-center overflow-hidden rounded-xl border border-slate-100 bg-white"
              >
                <img
                  id="fotoPreviewImg"
                  alt="Prévia da foto selecionada"
                  class="hidden max-h-40 w-full object-contain"
                />
                <p id="fotoPreviewEmpty" class="px-3 py-8 text-center text-xs text-slate-500">
                  Selecione uma imagem para ver a prévia.
                </p>
              </div>
            </div>
          </div>

          <div class="flex flex-col sm:flex-row gap-2">
            <button
              id="submitProductBtn"
              type="submit"
              class="flex-1 rounded-xl bg-blue-600 text-white font-semibold py-2.5 hover:bg-blue-700 active:scale-[0.99] transition"
            >
              Adicionar
            </button>
            <button
              type="button"
              id="cancelEditBtn"
              class="hidden flex-1 rounded-xl border border-slate-300 bg-white text-slate-700 font-semibold py-2.5 hover:bg-slate-50 active:scale-[0.99] transition"
            >
              Cancelar edição
            </button>
          </div>

          <p id="feedback" class="text-sm min-h-5"></p>
        </form>
      </section>

      <section class="md:col-span-3">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-lg font-semibold text-slate-800">Produtos</h2>
          <button
            id="clearButton"
            type="button"
            class="rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 hover:bg-slate-50 transition"
          >
            Limpar lista
          </button>
        </div>

        <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>

        <div id="emptyState" class="hidden mt-8 rounded-2xl border border-dashed border-slate-300 bg-white p-8 text-center text-slate-600">
          Nenhum produto adicionado ainda.
        </div>
      </section>
    </main>
  </div>

  <script src="../../components/productCard.js"></script>
  <script src="./script.js"></script>
</body>
</html>
