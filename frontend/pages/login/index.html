<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center p-4">
  <main class="w-full max-w-md">
    <section class="card-login bg-white shadow-xl rounded-2xl p-8 border border-slate-200">
      <header class="mb-6 text-center">
        <h1 class="text-2xl font-bold text-slate-800">Bem-vindo</h1>
        <p class="text-slate-500 mt-1">Faça login para continuar</p>
      </header>

      <div class="mb-4 rounded-xl border border-blue-100 bg-blue-50 px-4 py-3 text-sm text-blue-800">
        Mock de administrador: <strong>admin@teste.com</strong> / <strong>123456</strong>
      </div>
      <p class="text-xs text-slate-500 -mt-2 mb-5 text-center">
        Para login de colaborador, cadastre em <a class="underline" href="../usuarios/index.html">Usuários</a> e use o e-mail e a senha cadastrados.
      </p>

      <form id="loginForm" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-slate-700 mb-1">E-mail</label>
          <input
            id="email"
            name="email"
            type="email"
            placeholder="voce@exemplo.com"
            class="w-full rounded-xl border border-slate-300 px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
            required
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Senha</label>
          <input
            id="password"
            name="password"
            type="password"
            placeholder="********"
            class="w-full rounded-xl border border-slate-300 px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
            minlength="6"
            required
          />
        </div>

        <button
          id="submitButton"
          type="submit"
          class="w-full rounded-xl bg-blue-600 text-white font-semibold py-2.5 hover:bg-blue-700 active:scale-[0.99] transition"
        >
          Entrar
        </button>
      </form>

      <p id="feedback" class="mt-4 text-sm text-center min-h-5"></p>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
